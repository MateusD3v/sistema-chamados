<svg xmlns="http://www.w3.org/2000/svg" width="300" height="48" viewBox="0 0 300 48" role="img" aria-label="Governo do Pará">
  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#0f3a7e"/>
    </linearGradient>
    <clipPath id="flagClip">
      <rect width="60" height="48"/>
    </clipPath>
  </defs>
  <!-- Texto lateral (esquerda) -->
  <g font-family="Arial, Helvetica, sans-serif" fill="#111">
    <text x="0" y="16" font-size="9" font-weight="600" letter-spacing=".02em">SECRETARIA DE</text>
    <text x="0" y="30" font-size="11" font-weight="700" letter-spacing=".01em">SEGURANÇA PÚBLICA</text>
    <text x="0" y="43" font-size="11" font-weight="700" letter-spacing=".01em">E DEFESA SOCIAL</text>
  </g>
  <!-- Bandeira ao centro (vermelho com faixa diagonal branca e estrela azul) -->
  <g transform="translate(138,0)">
    <!-- Campo vermelho -->
    <rect width="60" height="48" fill="#e11d2a"/>
    <!-- Elementos recortados ao retângulo da bandeira -->
    <g clip-path="url(#flagClip)">
      <!-- Faixa diagonal branca -->
      <rect x="-20" y="18" width="100" height="12" fill="#ffffff" transform="rotate(38 30 24)"/>
      <!-- Estrela azul de 5 pontas centralizada -->
      <polygon fill="#0a3e83"
        points="
          30,14
          32.35,20.76
          39.51,20.91
          33.80,25.24
          35.88,32.09
          30,28
          24.12,32.09
          26.20,25.24
          20.49,20.91
          27.65,20.76
        "/>
    </g>
  </g>
  <!-- Palavra-marca à direita -->
  <g transform="translate(206,0)">
    <text x="0" y="16" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#111" letter-spacing=".12em">GOVERNO DO</text>
    <text x="0" y="40" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="28" fill="url(#blueGrad)" letter-spacing=".02em">PARÁ</text>
  </g>
</svg>
